<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TonCanvas</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      background: #111827;
    }

    #canvasContainer {
      display: flex;
      justify-content: center;
      margin-top: 10px;
    }

    canvas {
      background: #1e293b;
      border: 1px solid #334155;
      touch-action: none;
    }

    #info {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>
<body>

<header>🎨 TonCanvas</header>

<div id="canvasContainer">
  <canvas id="canvas" width="500" height="500"></canvas>
</div>

<div id="info">
  Klik petak untuk memilih
</div>

<button onclick="buyTile()">Beli Petak</button>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const gridSize = 50; // 50x50 dulu (MVP)
  const tileSize = canvas.width / gridSize;

  let selected = null;

  // gambar grid
  function drawGrid() {
    for (let x = 0; x < gridSize; x++) {
      for (let y = 0; y < gridSize; y++) {
        ctx.strokeStyle = "#334155";
        ctx.strokeRect(x * tileSize, y * tileSize, tileSize, tileSize);
      }
    }
  }

  drawGrid();

  // klik canvas
  canvas.addEventListener("click", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) / tileSize);
    const y = Math.floor((e.clientY - rect.top) / tileSize);

    selected = { x, y };

    document.getElementById("info").innerText =
      `Petak dipilih: (${x}, ${y})`;

    highlightTile(x, y);
  });

  function highlightTile(x, y) {
    drawGrid();
    ctx.fillStyle = "rgba(34,197,94,0.4)";
    ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
  }

  function buyTile() {
    if (!selected) {
      alert("Pilih petak dulu!");
      return;
    }

    alert(`Beli petak (${selected.x}, ${selected.y}) 🚀`);

    // nanti disini:
    // - kirim ke backend
    // - proses payment
  }
</script>

</body>
</html>
