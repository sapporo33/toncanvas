<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TonTurbo Airdrop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --primary-color: #38bdf8;
            --text-color: #f8fafc;
            --accent-color: #0ea5e9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--accent-color), var(--bg-color));
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            padding-bottom: 80px;
        }

        .page { display: none; }
        .active { display: block; }

        .card {
            background-color: var(--container-bg);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid #334155;
        }

        h2 { margin-top: 0; color: var(--primary-color); }

        /* Buttons & Tasks */
        .btn-task {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #334155;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .btn-task:hover { background: #475569; }

        .status-badge {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 5px;
            background: var(--accent-color);
        }

        /* Navigation Bottom */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: var(--container-bg);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #334155;
        }

        nav button {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
        }

        nav button.active-nav {
            color: var(--primary-color);
            font-weight: bold;
        }

        .stat-val { font-size: 1.5rem; font-weight: bold; color: var(--primary-color); }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 1.5rem;">TON TURBO</h1>
</header>

<main>
    <section id="home" class="page active">
        <div class="card" style="text-align: center;">
            <p>Total Balance</p>
            <div class="stat-val" id="balance">0 $TON</div>
        </div>
        <div class="card">
            <h3>Welcome!</h3>
            <p>Complete tasks to collect $TON coins!.</p>
        </div>
    </section>

    <section id="task" class="page">
        <h2>Task </h2>
        <div class="btn-task" onclick="completeTask('tg', 'https://t.me/TonTurboOfficial')">
            <span>Follow Telegram Channel</span>
            <span id="status-tg" class="status-badge">+1 $TON</span>
        </div>
        <div class="btn-task" onclick="completeTask('x', 'https://x.com/tonturboxyz')">
            <span>Follow X (Twitter)</span>
            <span id="status-x" class="status-badge">+1 $TON</span>
        </div>
    </section>

    <section id="referral" class="page">
        <h2>Referral</h2>
        <div class="card">
            <p>Invite friends and earn 0.1 $TON per person.</p>
            <input type="text" value="https://t.me/TonTurboBot?start=12345" readonly 
                   style="width: 100%; padding: 10px; background: #0f172a; border: none; color: #38bdf8; border-radius: 5px;">
            <button style="margin-top: 10px; width: 100%; padding: 10px; background: var(--accent-color); border: none; border-radius: 5px; color: white;">Copy Link</button>
        </div>
    </section>

    <section id="withdraw" class="page">
        <h2>Withdraw</h2>
        <div class="card">
            <p>Minimum Withdraw: 5 $TON</p>
            <button disabled style="width: 100%; padding: 15px; border-radius: 10px; background: #475569; color: #94a3b8; border: none;">
                Coming Soon
            </button>
        </div>
    </section>
</main>

<nav>
    <button onclick="showPage('home')" id="nav-home" class="active-nav">Home</button>
    <button onclick="showPage('task')" id="nav-task">Task</button>
    <button onclick="showPage('referral')" id="nav-referral">Referral</button>
    <button onclick="showPage('withdraw')" id="nav-withdraw">Withdraw</button>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let balance = 0;
    const completedTasks = JSON.parse(localStorage.getItem('tasks')) || {};

    // Inisialisasi data dari localStorage
    function init() {
        if(completedTasks.tg) updateUI('tg');
        if(completedTasks.x) updateUI('x');
        calculateBalance();
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
        
        document.getElementById(pageId).classList.add('active');
        document.getElementById('nav-' + pageId).classList.add('active-nav');
    }

    function completeTask(type, url) {
        if (completedTasks[type]) {
            tg.showAlert("This task is complete!");
            window.open(url, '_blank');
            return;
        }

        window.open(url, '_blank');
        
        // Simulasi verifikasi (biasanya via backend)
        setTimeout(() => {
            completedTasks[type] = true;
            localStorage.setItem('tasks', JSON.stringify(completedTasks));
            updateUI(type);
            calculateBalance();
            tg.showConfirm("Apakah kamu sudah follow? Jika ya, poin akan ditambahkan.");
        }, 2000);
    }

    function updateUI(type) {
        const badge = document.getElementById('status-' + type);
        badge.innerText = "Finished! ✅";
        badge.style.background = "#22c55e";
    }

    function calculateBalance() {
        balance = 0;
        if(completedTasks.tg) balance += 1;
        if(completedTasks.x) balance += 1;
        document.getElementById('balance').innerText = balance + " $TON";
    }

    init();
</script>

</body>
</html>
