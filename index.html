<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Telegram Mini App</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      background: #f3f4f6;
    }

    .container { padding: 16px; padding-bottom: 80px; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .profile img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    .balance-card {
      background: linear-gradient(135deg, #000, #111);
      color: white;
      padding: 20px;
      border-radius: 20px;
      margin: 20px 0;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .task-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon {
      width: 40px;
      height: 40px;
      background: #dbeafe;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn {
      background: black;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 10px;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #ddd;
    }

    .page { display: none; }
    .active { display: block; }
  </style>
</head>

<body>

<div class="container">

  <div id="home" class="page active">

    <div class="header">
      <div class="profile">
        <img id="avatar" src="https://via.placeholder.com/40">
        <div>
          <div>Welcome back</div>
          <b id="username">User</b>
        </div>
      </div>
      🔔
    </div>

    <div class="balance-card">
      <h2>Total Balance (TON)</h2>
      <h1 id="balance">0.00 TON</h1>
    </div>

    <h3>Pending Tasks</h3>

    <!-- Telegram -->
    <div class="card">
      <div class="task-left">
        <div class="icon">📩</div>
        <div>
          <div>Ton Turbo Official</div>
          <small>Telegram Channel (+0.25 TON)</small>
        </div>
      </div>
      <button class="btn" onclick="startTask('https://t.me/TonTurboOfficial', 0.25)">Start</button>
    </div>

    <!-- Twitter -->
    <div class="card">
      <div class="task-left">
        <div class="icon">🐦</div>
        <div>
          <div>Ton Turbo Official</div>
          <small>Twitter Follow (+0.25 TON)</small>
        </div>
      </div>
      <button class="btn" onclick="startTask('https://x.com/tonturboxyz', 0.25)">Start</button>
    </div>

    <!-- Invite -->
    <div class="card">
      <div class="task-left">
        <div class="icon">👥</div>
        <div>
          <div>Invite Friend</div>
          <small>+0.10 TON</small>
        </div>
      </div>
      <button class="btn" onclick="inviteTask()">Start</button>
    </div>

  </div>

  <div id="task" class="page"><h2>Task Center</h2></div>
  <div id="leaderboard" class="page"><h2>Leaderboard</h2></div>
  <div id="referral" class="page"><h2>Referral</h2></div>

  <div id="withdraw" class="page">
    <h2>Withdraw</h2>
    <input id="wd" placeholder="Jumlah">
    <button class="btn" onclick="withdraw()">Withdraw</button>
  </div>

</div>

<div class="nav">
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('task')">Task</button>
  <button onclick="showPage('leaderboard')">Rank</button>
  <button onclick="showPage('referral')">Ref</button>
  <button onclick="showPage('withdraw')">WD</button>
</div>

<script>
let balance = 0;

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function updateBalance() {
  document.getElementById('balance').innerText = balance.toFixed(2) + ' TON';
}

// TASK (OPEN LINK)
function startTask(url, amount) {
  window.open(url, '_blank');

  setTimeout(() => {
    balance += amount;
    updateBalance();
    alert('Reward +' + amount + ' TON');
  }, 1500);
}

// INVITE
function inviteTask() {
  const link = "https://t.me/your_bot?start=ref123";

  navigator.clipboard.writeText(link);
  alert("Link referral disalin!");

  balance += 0.1;
  updateBalance();
}

// WITHDRAW
function withdraw() {
  let val = parseFloat(document.getElementById('wd').value);

  if (isNaN(val)) return alert('Masukkan angka');
  if (val <= 0) return alert('Harus lebih dari 0');
  if (val > balance) return alert('Saldo tidak cukup');

  balance -= val;
  updateBalance();
  alert('Withdraw berhasil');
}

// TELEGRAM
if (window.Telegram?.WebApp) {
  const tg = window.Telegram.WebApp;
  tg.expand();

  const user = tg.initDataUnsafe?.user;

  if (user) {
    document.getElementById('username').innerText =
      '@' + (user.username || user.first_name);

    if (user.photo_url) {
      document.getElementById('avatar').src = user.photo_url;
    }
  }
}
</script>

</body>
</html>
