<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TonCanvas | Web3 Ad Space</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #0088cc;
            --accent: #22c55e;
            --text: #f8fafc;
            --border: #334155;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 10px 15px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border);
            background: #1e293b; z-index: 100; min-height: 60px;
        }

        .logo { font-weight: 800; font-size: 1.1rem; color: white; text-decoration: none; }
        .logo span { color: var(--primary); }

        /* Container untuk Button TON Connect */
        #ton-connect-btn { 
            min-width: 150px; 
            display: flex; 
            justify-content: flex-end;
        }

        main {
            flex: 1; overflow: auto; display: flex; justify-content: center;
            align-items: flex-start; padding: 10px; background: #0b1120;
        }

        .canvas-container {
            position: relative; 
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: #1e293b;
        }

        canvas { display: block; touch-action: none; cursor: crosshair; }

        /* Action Panel */
        .panel {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 400px; background: var(--card);
            border: 1px solid var(--primary); border-radius: 15px; padding: 15px;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.5); z-index: 1000;
            display: none;
        }

        .input-group { margin: 10px 0; }
        input {
            width: 100%; background: #0f172a; border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 8px; box-sizing: border-box;
        }

        .btn-mint {
            width: 100%; padding: 12px; background: var(--accent);
            color: white; border: none; border-radius: 10px; font-weight: bold;
            cursor: pointer; font-size: 14px;
        }

        #status-bar {
            background: var(--primary); color: white; font-size: 12px;
            padding: 4px; text-align: center;
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">TON<span>CANVAS</span></a>
    <div id="ton-connect-btn"></div>
</header>

<div id="status-bar">Tap any tile to start advertising</div>

<main>
    <div class="canvas-container">
        <canvas id="appCanvas" width="800" height="800"></canvas>
    </div>
</main>

<div class="panel" id="uiPanel">
    <div style="display:flex; justify-content: space-between; margin-bottom: 10px;">
        <span id="coordLabel" style="font-weight: bold; color: var(--accent);">Tile: (0,0)</span>
        <button onclick="hidePanel()" style="background:none; border:none; color:white; font-size:18px;">✕</button>
    </div>
    <input type="text" id="imgUrl" placeholder="Image URL (direct link)" style="margin-bottom: 8px;">
    <input type="text" id="targetLink" placeholder="Ad Link (t.me/yourlink)" style="margin-bottom: 12px;">
    <button class="btn-mint" onclick="processPayment()">MINT FOR 0.1 TON</button>
</div>

<script>
    let tonConnectUI;
    const canvas = document.getElementById('appCanvas');
    const ctx = canvas.getContext('2d');
    const panel = document.getElementById('uiPanel');
    
    const gridSize = 40; 
    const tileSize = canvas.width / gridSize;
    let selected = null;
    let tilesData = {}; 

    // 1. INITIALIZE APP & TON CONNECT
    document.addEventListener('DOMContentLoaded', async () => {
        // Init Telegram
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        // Init TON Connect UI
        tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp/main/public/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        draw();
    });

    // 2. DRAWING LOGIC
    function draw() {
        ctx.fillStyle = "#1e293b"; // Background dasar
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let x = 0; x < gridSize; x++) {
            for (let y = 0; y < gridSize; y++) {
                const key = `${x}_${y}`;
                
                // Draw owned tiles
                if (tilesData[key]) {
                    ctx.fillStyle = tilesData[key].color;
                    ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
                }

                // Draw Grid Lines (Dibuat lebih kontras: Putih transparan)
                ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
                ctx.lineWidth = 0.5;
                ctx.strokeRect(x * tileSize, y * tileSize, tileSize, tileSize);
            }
        }

        // Draw Selection
        if (selected) {
            ctx.fillStyle = "rgba(34, 197, 94, 0.4)";
            ctx.fillRect(selected.x * tileSize, selected.y * tileSize, tileSize, tileSize);
            ctx.strokeStyle = "#22c55e";
            ctx.lineWidth = 3;
            ctx.strokeRect(selected.x * tileSize, selected.y * tileSize, tileSize, tileSize);
        }
    }

    // 3. INTERACTION
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor(((e.clientX - rect.left) / rect.width) * gridSize);
        const y = Math.floor(((e.clientY - rect.top) / rect.height) * gridSize);

        selected = { x, y };
        document.getElementById('coordLabel').innerText = `Tile Selected: (${x}, ${y})`;
        panel.style.display = 'block';
        draw();

        if (window.Telegram.WebApp.HapticFeedback) {
            window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
        }
    });

    function hidePanel() {
        panel.style.display = 'none';
        selected = null;
        draw();
    }

    // 4. PAYMENT LOGIC
    async function processPayment() {
        if (!tonConnectUI.connected) {
            alert("Please connect your wallet first using the button at the top!");
            return;
        }

        const tx = {
            validUntil: Math.floor(Date.now() / 1000) + 300,
            messages: [{
                address: "UQDZDbDI-vjbkEpviXoWXuAc3dTHG-MiYC8gi5tYnHxXMLDd", // GANTI INI!
                amount: "500000000" // 0.5 TON
            }]
        };

        try {
            await tonConnectUI.sendTransaction(tx);
            
            // Berhasil: Update visual
            const key = `${selected.x}_${selected.y}`;
            tilesData[key] = { color: '#22c55e' }; 
            alert("Success! Your ad is being processed.");
            hidePanel();
        } catch (e) {
            console.error(e);
            alert("Transaction failed or rejected.");
        }
    }
</script>

</body>
</html>
