<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TonCanvas | Web3 Ad Space</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #0088cc;
            --accent: #22c55e;
            --text: #f8fafc;
            --border: #334155;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 10px 15px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border);
            background: #1e293b; z-index: 100; min-height: 70px;
        }

        .logo { font-weight: 800; font-size: 1.1rem; color: white; text-decoration: none; }
        .logo span { color: var(--primary); }

        #ton-connect-btn { 
            min-width: 140px;
            display: flex;
            justify-content: flex-end;
        }

        main {
            flex: 1; overflow: auto; display: flex; justify-content: center;
            align-items: flex-start; padding: 20px; background: #0b1120;
        }

        .canvas-container {
            position: relative; 
            border: 2px solid var(--primary);
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            background: #1e293b;
        }

        canvas { display: block; touch-action: none; cursor: crosshair; }

        .panel {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 380px; background: var(--card);
            border: 1px solid var(--primary); border-radius: 16px; padding: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5); z-index: 1000;
            display: none;
        }

        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 10px; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; }
        input {
            width: 100%; background: #0f172a; border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 10px; box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: var(--primary); }

        .btn-mint {
            width: 100%; padding: 14px; background: var(--accent);
            color: white; border: none; border-radius: 12px; font-weight: bold;
            cursor: pointer; font-size: 15px; margin-top: 10px;
        }

        #status-bar {
            background: var(--primary); color: white; font-size: 11px;
            padding: 6px; text-align: center; letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">TON<span>CANVAS</span></a>
    <div id="ton-connect-btn"></div>
</header>

<div id="status-bar">SELECT A TILE TO ADVERTISE YOUR PROJECT</div>

<main>
    <div class="canvas-container">
        <canvas id="appCanvas" width="800" height="800"></canvas>
    </div>
</main>

<div class="panel" id="uiPanel">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <span id="coordLabel" style="font-weight: 800; color: var(--accent); font-size: 1.1rem;">(0,0)</span>
        <button onclick="hidePanel()" style="background:#334155; border:none; color:white; width:30px; height:30px; border-radius:50%; cursor:pointer;">✕</button>
    </div>
    
    <div class="input-group">
        <label>Image URL</label>
        <input type="text" id="imgUrl" placeholder="https://image.link/logo.png">
    </div>
    <div class="input-group">
        <label>Redirect Link</label>
        <input type="text" id="targetLink" placeholder="https://t.me/your_bot">
    </div>
    
    <button class="btn-mint" id="mintBtn" onclick="processPayment()">MINT TILE (0.5 TON)</button>
</div>

<script>
    let tonConnectUI;
    const canvas = document.getElementById('appCanvas');
    const ctx = canvas.getContext('2d');
    const panel = document.getElementById('uiPanel');
    
    const gridSize = 40; 
    const tileSize = canvas.width / gridSize;
    let selected = null;
    let tilesData = {}; 

    // --- INITIALIZATION ---
    async function init() {
        // Init Telegram
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        // Init TON Connect
        // Menggunakan library yang ter-load dari CDN unpkg
        tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp/main/public/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        draw();
    }

    // --- DRAWING ---
    function draw() {
        ctx.fillStyle = "#1e293b";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let x = 0; x < gridSize; x++) {
            for (let y = 0; y < gridSize; y++) {
                const key = `${x}_${y}`;
                
                if (tilesData[key]) {
                    ctx.fillStyle = tilesData[key].color;
                    ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
                }

                ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
                ctx.lineWidth = 0.5;
                ctx.strokeRect(x * tileSize, y * tileSize, tileSize, tileSize);
            }
        }

        if (selected) {
            ctx.fillStyle = "rgba(34, 197, 94, 0.3)";
            ctx.fillRect(selected.x * tileSize, selected.y * tileSize, tileSize, tileSize);
            ctx.strokeStyle = "#22c55e";
            ctx.lineWidth = 3;
            ctx.strokeRect(selected.x * tileSize, selected.y * tileSize, tileSize, tileSize);
        }
    }

    // --- INTERACTION ---
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        const x = Math.floor(((e.clientX - rect.left) * scaleX) / tileSize);
        const y = Math.floor(((e.clientY - rect.top) * scaleY) / tileSize);

        if (x >= 0 && x < gridSize && y >= 0 && y < gridSize) {
            selected = { x, y };
            document.getElementById('coordLabel').innerText = `TILE: ${x}, ${y}`;
            panel.style.display = 'block';
            draw();

            if (window.Telegram?.WebApp?.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }
        }
    });

    function hidePanel() {
        panel.style.display = 'none';
        selected = null;
        draw();
    }

    // --- PAYMENT ---
    async function processPayment() {
        if (!tonConnectUI.connected) {
            alert("Please connect your wallet first!");
            tonConnectUI.openModal();
            return;
        }

        const img = document.getElementById('imgUrl').value;
        const link = document.getElementById('targetLink').value;

        if (!img || !link) {
            alert("Please fill in both image and redirect links.");
            return;
        }

        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 360,
            messages: [{
                address: "UQDZDbDI-vjbkEpviXoWXuAc3dTHG-MiYC8gi5tYnHxXMLDd",
                amount: "500000000" // 0.5 TON
            }]
        };

        try {
            document.getElementById('mintBtn').innerText = "AWAITING WALLET...";
            document.getElementById('mintBtn').disabled = true;

            const result = await tonConnectUI.sendTransaction(transaction);
            
            // Success Logic
            const key = `${selected.x}_${selected.y}`;
            tilesData[key] = { color: '#22c55e', img, link }; 
            alert("Transaction sent successfully!");
            hidePanel();
        } catch (e) {
            console.error(e);
            alert("Transaction failed or rejected.");
        } finally {
            document.getElementById('mintBtn').innerText = "MINT FOR 0.5 TON";
            document.getElementById('mintBtn').disabled = false;
        }
    }

    // Start
    init();
</script>

    <link rel="stylesheet" href="https://unpkg.com/@tonconnect/ui@latest/dist/style.css">
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

    <script type="module">
    import { TonConnectUI } from 'https://cdn.skypack.dev/@tonconnect/ui';
    
    // Simpan ke window agar bisa diakses fungsi lain jika perlu
    window.TonConnectUI = TonConnectUI;

    // 2. Fungsi Inisialisasi di dalam Modul
    async function initTonConnect() {
        const btnContainer = document.getElementById('ton-connect-btn');
        
        if (!btnContainer) {
            setTimeout(initTonConnect, 100);
            return;
        }

        try {
            // Inisialisasi langsung menggunakan class yang di-import
            window.tonConnectUI = new TonConnectUI({
                manifestUrl: 'https://toncanvas.vercel.app/tonconnect-manifest.json', 
                buttonRootId: 'ton-connect-btn'
            });

            console.log("TON Connect Berhasil Dimuat");
        } catch (e) {
            console.error("Gagal Inisialisasi TON Connect:", e);
        }
    }

    // Jalankan inisialisasi
    initTonConnect();
</script>
