<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TonCanvas | Web3 Ad Space</title>

    <!-- Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- TON CONNECT (FIX: pakai defer) -->
    <script defer src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: white;
            font-family: sans-serif;
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: #1e293b;
            align-items: center;
        }

        #ton-connect-btn {
            min-width: 160px;
            display: flex;
            justify-content: flex-end;
        }

        canvas {
            display: block;
            margin: 20px auto;
            border: 2px solid #0088cc;
        }

        .panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }

        input {
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
        }

        button {
            padding: 12px;
            width: 100%;
            background: #22c55e;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>
    <b>TONCANVAS</b>
    <div id="ton-connect-btn"></div>
</header>

<canvas id="appCanvas" width="400" height="400"></canvas>

<div class="panel" id="uiPanel">
    <div id="coordLabel">(0,0)</div>
    <input id="imgUrl" placeholder="Image URL">
    <input id="targetLink" placeholder="Redirect URL">
    <button id="mintBtn" onclick="processPayment()">MINT 0.5 TON</button>
</div>

<script>
let tonConnectUI;
let selected = null;

const canvas = document.getElementById('appCanvas');
const ctx = canvas.getContext('2d');

const gridSize = 10;
const tileSize = canvas.width / gridSize;

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let x = 0; x < gridSize; x++) {
        for (let y = 0; y < gridSize; y++) {
            ctx.strokeStyle = "gray";
            ctx.strokeRect(x * tileSize, y * tileSize, tileSize, tileSize);
        }
    }

    if (selected) {
        ctx.fillStyle = "rgba(34,197,94,0.5)";
        ctx.fillRect(selected.x * tileSize, selected.y * tileSize, tileSize, tileSize);
    }
}

canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) / tileSize);
    const y = Math.floor((e.clientY - rect.top) / tileSize);

    selected = { x, y };

    document.getElementById('coordLabel').innerText = `Tile: ${x}, ${y}`;
    document.getElementById('uiPanel').style.display = 'block';

    draw();
});

async function processPayment() {
    if (!tonConnectUI) {
        alert("TON Connect belum siap");
        return;
    }

    if (!tonConnectUI.connected) {
        tonConnectUI.openModal();
        return;
    }

    const transaction = {
        validUntil: Math.floor(Date.now() / 1000) + 300,
        messages: [
            {
                address: "UQDZDbDI-vjbkEpviXoWXuAc3dTHG-MiYC8gi5tYnHxXMLDd",
                amount: "500000000"
            }
        ]
    };

    try {
        document.getElementById('mintBtn').innerText = "PROCESSING...";

        await tonConnectUI.sendTransaction(transaction);

        alert("SUCCESS!");
    } catch (e) {
        console.error(e);
        alert("FAILED");
    } finally {
        document.getElementById('mintBtn').innerText = "MINT 0.5 TON";
    }
}

function waitForTON() {
    if (window.TONConnectUI) {
        initTon();
    } else {
        console.log("Waiting TON...");
        setTimeout(waitForTON, 200);
    }
}

function initTon() {
    try {
        tonConnectUI = new TONConnectUI({
            manifestUrl: 'https://toncanvas.vercel.app/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        console.log("TON READY");
    } catch (e) {
        console.error("TON ERROR:", e);
    }
}

window.addEventListener('load', () => {
    draw();

    if (window.Telegram?.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }

    waitForTON(); // FIX PENTING
});
</script>

</body>
</html>
