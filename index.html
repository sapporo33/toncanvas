<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>TonCanvas Portrait Ads — Buy Tiles</title>
<style>
  :root{

    --hover:rgba(59,130,246,0.28); --select:rgba(34,197,94,0.45);

  html,body{height:100%;margin:0;background:var(--bg);color:#fff;font-family:Inter,system-ui,Roboto,Arial;}

  /* debug panel */

  #tc-log { margin-top:8px; max-height:220px; overflow:auto; white-space:pre-wrap; font-family:monospace; font-size:11px; color:#d1e8ff; }
</style>

<body>
<div id="app" role="application" aria-label="TonCanvas portrait">
  <header>
    <div>
      <div class="title">TonCanvas Ads</div>
      <div class="sub">Tap untuk pilih • Drag untuk multi‑select • Pinch/scroll untuk zoom • Harga: <span class="price">0.5 TON</span></div>

<!-- Panel untuk metadata & beli -->
<div id="panel" role="dialog" aria-hidden="true">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <div><strong id="panelTitle">Tile</strong><div class="sub" id="panelPos">—</div></div>

  </div>

  <input id="imgUrl" placeholder="URL Gambar (png/jpg)"/>
  <input id="linkUrl" placeholder="Link tujuan (https://...)"/>
  <div class="row">
    <button id="saveMeta" class="btn">Simpan Metadata</button>
    <button id="buyBtn" class="btn" style="background:#22c55e">Beli (0.5 TON)</button>
  </div>
  <div style="margin-top:8px; font-size:12px; color:var(--muted);">Setelah beli, petak akan menampilkan gambar dan link. Integrasikan wallet untuk pembayaran nyata.</div>
</div>

<!-- Debug panel -->
<div id="tc-debug" aria-hidden="false">
  <div style="display:flex;gap:6px;align-items:center;">
    <button id="tc-check" style="background:#0ea5e9;border:none;padding:6px 8px;border-radius:6px;cursor:pointer;">Check TonConnect</button>
    <button id="tc-force" style="background:#111827;border:1px solid rgba(255,255,255,0.06);padding:6px 8px;border-radius:6px;cursor:pointer;">Force Load</button>
    <button id="tc-copy" style="background:#111827;border:1px solid rgba(255,255,255,0.06);padding:6px 8px;border-radius:6px;cursor:pointer;">Copy Logs</button>
  </div>
  <div id="tc-log"></div>
</div>

<script>
/* ================= Configuration ================= */
const GRID_SIZE = 40;
const TILE_SIZE = 20;
const MIN_SCALE = 0.6;
const MAX_SCALE = 3.0;
const INITIAL_SCALE = 1.0;
const TILE_PRICE_NANOTON = 500000000; // 0.5 TON in nanotons
const STORAGE_KEY = 'toncanvas_tiles_v1';

/* Replace with your receiver address and backend verify endpoint */
const RECEIVER_ADDRESS = "UQDZDbDI-vjbkEpviXoWXuAc3dTHG-MiYC8gi5tYnHxXMLDd";
const VERIFY_API_URL = "/api/verify-purchase";

/* ================ Storage helpers ================ */
function loadTileData() {
  try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : {}; }
  catch (e) { return {}; }
}
function saveTileData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){}
}

/* ================ PortraitGrid class ================ */
class PortraitGrid {
  constructor(canvas, opts = {}) {
    if (!canvas || !canvas.getContext) throw new Error('Canvas required');
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.dpr = Math.max(1, window.devicePixelRatio || 1);

    this.gridSize = opts.gridSize || GRID_SIZE;
    this.tileSize = opts.tileSize || TILE_SIZE;
    this.scale = opts.scale || INITIAL_SCALE;

    this.selected = new Set();
    this.hover = null;

    this.isDragging = false;
    this.dragStart = null;
    this.dragEnd = null;

    this.tileData = loadTileData();

    this._needsRedraw = true;
    this._bindEvents();
    this._resize();
    window.addEventListener('resize', () => this._resize());
    this._loop();
  }

  /* Public API */
  clear() { this.selected.clear(); this._mark(); }
  selectAll() { this.selected.clear(); for (let x=0;x<this.gridSize;x++) for (let y=0;y<this.gridSize;y++) this.selected.add(`${x},${y}`); this._mark(); }
  getTileKey(x,y){ return `${x},${y}`; }
  getTileMeta(x,y){ return this.tileData[this.getTileKey(x,y)] || null; }
  setTileMeta(x,y,meta){ this.tileData[this.getTileKey(x,y)] = Object.assign({}, this.tileData[this.getTileKey(x,y)]||{}, meta); saveTileData(this.tileData); this._mark(); }

  _bindEvents() {
    this.canvas.addEventListener('pointerdown', (e) => {
      this.canvas.setPointerCapture(e.pointerId);
      const tile = this._screenToTile(e.clientX, e.clientY);
      this.isDragging = true;
      this.dragStart = tile ? {x:tile.x,y:tile.y} : {x:-1,y:-1};
      this.dragEnd = this.dragStart;
      this._mark();
    });

    this.canvas.addEventListener('pointermove', (e) => {
      if (this.isDragging) {
        const t = this._screenToTile(e.clientX, e.clientY);
        this.dragEnd = t ? {x:t.x,y:t.y} : {x:-1,y:-1};
        this._mark();
      } else {
        const t = this._screenToTile(e.clientX, e.clientY);
        this.hover = t;
        _updatePosLabel(t);
        this._mark();
      }
    });

    this.canvas.addEventListener('pointerup', (e) => {
      this.canvas.releasePointerCapture(e.pointerId);
      if (this.isDragging) {
        this.isDragging = false;
        this._applyDragSelection();
        this.dragStart = null; this.dragEnd = null;
        this._mark();
      } else {
        const t = this._screenToTile(e.clientX, e.clientY);
        if (t) openPanelForTile(t.x, t.y);
      }
    });

    // wheel zoom
    this.canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = -e.deltaY * 0.0015;
      this._zoomAt(delta);
    }, {passive:false});

    // pinch zoom
    let pinchStart = null;
    this.canvas.addEventListener('touchstart', (e) => { if (e.touches.length===2) pinchStart = this._touchDistance(e.touches); }, {passive:true});
    this.canvas.addEventListener('touchmove', (e) => {
      if (e.touches.length===2 && pinchStart) {
        const d = this._touchDistance(e.touches);
        const delta = (d - pinchStart) * 0.002;
        const cx = (e.touches[0].clientX + e.touches[1].clientX)/2;
        const cy = (e.touches[0].clientY + e.touches[1].clientY)/2;
        this._zoomAt(delta, cx, cy);
        pinchStart = d;
      }
    }, {passive:true});
    this.canvas.addEventListener('touchend', () => { pinchStart = null; }, {passive:true});
  }

  _touchDistance(touches){ const a=touches[0], b=touches[1]; return Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY); }

  _applyDragSelection(){
    if (!this.dragStart || !this.dragEnd) return;
    const s = this._clampTile(this.dragStart);
    const e = this._clampTile(this.dragEnd);
    if (!s || !e) return;
    const x1 = Math.min(s.x,e.x), y1 = Math.min(s.y,e.y);
    const x2 = Math.max(s.x,e.x), y2 = Math.max(s.y,e.y);
    for (let x=x1;x<=x2;x++) for (let y=y1;y<=y2;y++) this.selected.add(`${x},${y}`);
  }

  _clampTile(t){
    if (!t) return null;
    const x = Math.floor(Number(t.x)), y = Math.floor(Number(t.y));
    if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
    if (x<0||y<0||x>=this.gridSize||y>=this.gridSize) return null;
    return {x,y};
  }

  _screenToTile(clientX, clientY){
    const rect = this.canvas.getBoundingClientRect();
    const px = (clientX - rect.left) * (this.canvas.width / rect.width);
    const py = (clientY - rect.top) * (this.canvas.height / rect.height);
    const gridPixel = this.gridSize * this.tileSize * this.scale * this.dpr;
    const canvasCenterX = this.canvas.width / 2;
    const canvasCenterY = this.canvas.height / 2;
    const gridLeft = canvasCenterX - gridPixel / 2;
    const gridTop = canvasCenterY - gridPixel / 2;
    const localX = (px - gridLeft) / (this.scale * this.dpr);
    const localY = (py - gridTop) / (this.scale * this.dpr);
    const tx = Math.floor(localX / this.tileSize);
    const ty = Math.floor(localY / this.tileSize);
    if (tx<0||ty<0||tx>=this.gridSize||ty>=this.gridSize) return null;
    return {x:tx,y:ty};
  }

  _zoomAt(delta){
    const old = this.scale;
    let next = Math.min(MAX_SCALE, Math.max(MIN_SCALE, this.scale + delta));
    if (next === old) return;
    this.scale = next;
    this._mark();
  }

  _resize(){
    const maxWidth = Math.min(window.innerWidth - 24, 420);
    const availableHeight = window.innerHeight - 140;
    const final = Math.max(240, Math.min(maxWidth, Math.floor(Math.min(window.innerWidth - 24, availableHeight))));
    this.canvas.style.width = final + 'px';
    this.canvas.style.height = final + 'px';
    const backing = Math.round(final * this.dpr);
    this.canvas.width = backing; this.canvas.height = backing;
    this._mark();
  }

  _mark(){ this._needsRedraw = true; }

  _loop(){ requestAnimationFrame(()=>this._loop()); if (this._needsRedraw){ this._needsRedraw=false; this._draw(); } }

  _draw(){
    const ctx = this.ctx, canvas = this.canvas;
    if (!ctx||!canvas) return;
    ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,canvas.width,canvas.height);

    const gridPixel = this.gridSize * this.tileSize * this.scale * this.dpr;
    const cx = canvas.width/2, cy = canvas.height/2;
    const left = cx - gridPixel/2, top = cy - gridPixel/2;

    ctx.setTransform(this.scale * this.dpr, 0, 0, this.scale * this.dpr, left, top);

    // background
    ctx.fillStyle = '#1e293b';
    ctx.fillRect(0,0,this.gridSize*this.tileSize,this.gridSize*this.tileSize);

    // draw images for owned tiles
    for (const key in this.tileData) {
      const meta = this.tileData[key];
      if (!meta || !meta.img) continue;
      const [sx,sy] = key.split(',').map(Number);
      if (!Number.isFinite(sx) || !Number.isFinite(sy)) continue;
      if (!meta._imgObj && meta.img) {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.src = meta.img;
        img.onload = () => { meta._imgObj = img; this._mark(); };
        img.onerror = () => { meta._imgObj = null; };
        meta._imgObj = null;
      } else if (meta._imgObj) {
        ctx.drawImage(meta._imgObj, sx*this.tileSize, sy*this.tileSize, this.tileSize, this.tileSize);
      }
    }

    // grid lines
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1 / (this.scale * this.dpr);
    for (let i=0;i<=this.gridSize;i++){
      const p = i*this.tileSize + 0.5;
      ctx.moveTo(p,0); ctx.lineTo(p,this.gridSize*this.tileSize);
      ctx.moveTo(0,p); ctx.lineTo(this.gridSize*this.tileSize,p);
    }
    ctx.stroke();

    // selected overlay
    if (this.selected.size){
      ctx.fillStyle = 'rgba(34,197,94,0.25)';
      for (const k of this.selected){
        const [sx,sy] = k.split(',').map(Number);
        if (!Number.isFinite(sx) || !Number.isFinite(sy)) continue;
        ctx.fillRect(sx*this.tileSize, sy*this.tileSize, this.tileSize, this.tileSize);
      }
    }

    // hover
    if (this.hover){
      const {x,y} = this.hover;
      if (Number.isInteger(x) && Number.isInteger(y)){
        ctx.fillStyle = 'rgba(59,130,246,0.18)';
        ctx.fillRect(x*this.tileSize, y*this.tileSize, this.tileSize, this.tileSize);
      }
    }

    // owned overlay
    for (const key in this.tileData){
      const meta = this.tileData[key];
      if (!meta || !meta.owner) continue;
      const [sx,sy] = key.split(',').map(Number);
      if (!Number.isFinite(sx) || !Number.isFinite(sy)) continue;
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(sx*this.tileSize, sy*this.tileSize, this.tileSize, this.tileSize);
      ctx.fillStyle = '#ffd166';
      ctx.fillRect(sx*this.tileSize + this.tileSize - 8, sy*this.tileSize + 2, 6, 6);
    }

    // drag selection box
    if (this.isDragging && this.dragStart && this.dragEnd){
      const s = this.dragStart || {x:-1,y:-1}, e = this.dragEnd || {x:-1,y:-1};
      const sx = Math.max(0, Math.min(this.gridSize-1, s.x));
      const sy = Math.max(0, Math.min(this.gridSize-1, s.y));
      const ex = Math.max(0, Math.min(this.gridSize-1, e.x));
      const ey = Math.max(0, Math.min(this.gridSize-1, e.y));
      const x1 = Math.min(sx,ex), y1 = Math.min(sy,ey);
      const x2 = Math.max(sx,ex), y2 = Math.max(sy,ey);
      ctx.fillStyle = 'rgba(59,130,246,0.18)';
      ctx.fillRect(x1*this.tileSize, y1*this.tileSize, (x2-x1+1)*this.tileSize, (y2-y1+1)*this.tileSize);
      ctx.strokeStyle = 'rgba(59,130,246,0.6)';
      ctx.lineWidth = 1 / (this.scale * this.dpr);
      ctx.strokeRect(x1*this.tileSize+0.5, y1*this.tileSize+0.5, (x2-x1+1)*this.tileSize-1, (y2-y1+1)*this.tileSize-1);
    }
  }
}

/* ================ UI & Panel ================ */
let gridInstance = null;
document.addEventListener('DOMContentLoaded', () => {
  const canvas = document.getElementById('portraitCanvas');
  gridInstance = new PortraitGrid(canvas, { gridSize: 40, tileSize: 20, scale: 1 });

  document.getElementById('clearBtn').addEventListener('click', () => gridInstance.clear());
  document.getElementById('selectAllBtn').addEventListener('click', () => gridInstance.selectAll());

  document.getElementById('closePanel').addEventListener('click', closePanel);
  document.getElementById('saveMeta').addEventListener('click', () => {
    const key = panelState.key; if (!key) return;
    const img = document.getElementById('imgUrl').value.trim() || null;
    const link = document.getElementById('linkUrl').value.trim() || null;
    const [x,y] = key.split(',').map(Number);
    gridInstance.setTileMeta(x,y, { img, link });
    closePanel();
  });
  document.getElementById('buyBtn').addEventListener('click', async () => {
    const key = panelState.key; if (!key) return;
    const [x,y] = key.split(',').map(Number);
    await buyTileFlow(x,y);
  });

  // connect wallet button
  document.getElementById('connectBtn').addEventListener('click', async () => {
    const ui = await ensureTonConnectReady();
    if (ui && ui.connect) {
      try {
        await ui.connect();
        alert('Wallet connected');
      } catch (err) {
        console.error('connect error', err);
        alert('Gagal connect wallet');
      }
    } else {
      alert('TonConnect tidak tersedia, menggunakan simulasi.');
    }
  });

  // debug buttons
  document.getElementById('tc-check').addEventListener('click', runDebugCheck);
  document.getElementById('tc-force').addEventListener('click', forceLoadScripts);
  document.getElementById('tc-copy').addEventListener('click', () => {
    const txt = document.getElementById('tc-log').innerText;
    navigator.clipboard && navigator.clipboard.writeText(txt).then(()=>alert('Logs copied'));
  });
});

/* Panel state */
const panelEl = document.getElementById('panel');
const panelState = { key: null };
function openPanelForTile(x,y){
  const key = `${x},${y}`;
  panelState.key = key;
  const meta = gridInstance.getTileMeta(x,y) || {};
  document.getElementById('panelTitle').textContent = `Tile ${key}`;
  document.getElementById('panelPos').textContent = meta.owner ? `Owned by ${meta.owner}` : `Price: 0.5 TON`;
  document.getElementById('imgUrl').value = meta.img || '';
  document.getElementById('linkUrl').value = meta.link || '';
  panelEl.style.display = 'block';
  panelEl.setAttribute('aria-hidden','false');
}
function closePanel(){ panelState.key = null; panelEl.style.display='none'; panelEl.setAttribute('aria-hidden','true'); }

/* ================ Purchase flow ================ */
async function buyTileFlow(x,y){
  const key = `${x},${y}`;
  const meta = gridInstance.getTileMeta(x,y) || {};
  if (meta.owner) { alert('Petak sudah dimiliki.'); return; }

  try {
    const res = await openWalletAndPay(key, TILE_PRICE_NANOTON);
    if (!res || !res.success) { alert('Pembayaran dibatalkan atau gagal.'); return; }

    // on success, save owner and optional metadata from panel
    const img = document.getElementById('imgUrl').value.trim() || null;
    const link = document.getElementById('linkUrl').value.trim() || null;
    gridInstance.setTileMeta(x,y, { owner: res.buyer || 'unknown', img, link, tx: res.tx || null });
    alert('Pembelian berhasil! Petak sekarang milik: ' + (res.buyer || 'Anda'));
    closePanel();
  } catch (err) {
    console.error('buyTileFlow error', err);
    alert('Terjadi kesalahan saat proses pembelian.');
  }
}

/* ================ TonConnect auto-detect (parallel) ================ */
async function ensureTonConnectReady() {
  if (window.tonConnectUI) return window.tonConnectUI;

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      if (document.querySelector(`script[src="${src}"]`)) return resolve();
      const s = document.createElement('script');
      s.src = src;
      s.onload = () => resolve();
      s.onerror = () => reject(new Error('Failed to load ' + src));
      document.head.appendChild(s);
    });
  }

  function fetchWithTimeout(url, ms = 2500) {
    return new Promise((resolve, reject) => {
      const timer = setTimeout(() => reject(new Error('timeout')), ms);
      fetch(url, { method: 'GET', cache: 'no-store' })
        .then(res => {
          clearTimeout(timer);
          if (!res.ok) return reject(new Error('status ' + res.status));
          res.clone().json().then(() => resolve(url)).catch(() => reject(new Error('invalid json')));
        })
        .catch(err => { clearTimeout(timer); reject(err); });
    });
  }

  try {
    // start loading scripts (do not await both to speed up)
    loadScript('https://unpkg.com/@tonconnect/sdk/dist/tonconnect.umd.js').catch(()=>{});
    loadScript('https://unpkg.com/@tonconnect/ui/dist/tonconnect-ui.min.js').catch(()=>{});

    const candidates = [
      window.location.origin + '/tonconnect-manifest.json',
      window.location.origin + '/public/tonconnect-manifest.json'
    ];

    // try both in parallel and take first fulfilled
    const manifestUrl = await Promise.any(candidates.map(u => fetchWithTimeout(u, 2500))).catch(() => null);
    if (!manifestUrl) throw new Error('Manifest not reachable at known paths');

    // small grace period for script arrival
    if (!window.TonConnectUI) {
      await new Promise(r => setTimeout(r, 400));
      if (!window.TonConnectUI) throw new Error('TonConnectUI library not loaded');
    }

    const ui = new window.TonConnectUI.TonConnectUI({
      manifestUrl,
      projectId: 'toncanvas-project'
    });
    window.tonConnectUI = ui;
    appendLog('TonConnectUI initialized with manifest: ' + manifestUrl);
    return ui;
  } catch (err) {
    appendLog('TonConnect load failed: ' + (err && err.message ? err.message : String(err)));
    return null;
  }
}

/* ================ openWalletAndPay (TonConnect + backend verify) ================ */
async function openWalletAndPay(tileKey, amountNanoton) {
  await ensureTonConnectReady();

  if (window.tonConnectUI && window.tonConnectUI.sendTransaction) {
    try {
      const transaction = {
        validUntil: Math.floor(Date.now() / 1000) + 300,
        messages: [
          { address: RECEIVER_ADDRESS, amount: String(amountNanoton) }
        ]
      };
      const txResult = await window.tonConnectUI.sendTransaction(transaction);
      appendLog('Wallet returned txResult: ' + JSON.stringify(txResult));

      const payload = { tileKey, amount: amountNanoton, txResult, timestamp: Date.now() };
      const resp = await fetch(VERIFY_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!resp.ok) {
        appendLog('Verify API error: ' + await resp.text());
        return { success: false };
      }
      const body = await resp.json();
      if (body && body.success) return { success: true, buyer: body.buyer, tx: body.tx };
      appendLog('Verify API rejected tx: ' + JSON.stringify(body));
      return { success: false };
    } catch (err) {
      appendLog('TonConnect payment error: ' + (err && err.message ? err.message : String(err)));
      return { success: false };
    }
  }

  // fallback simulation
  const ok = confirm(`Simulasi: bayar 0.5 TON untuk petak ${tileKey}?`);
  if (!ok) return { success: false };
  const fakeBuyer = 'SIMULATED_WALLET';
  const fakeTx = { id: 'sim-' + Date.now(), amount: amountNanoton };
  try {
    await fetch(VERIFY_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tileKey, amount: amountNanoton, txResult: { simulated: true, tx: fakeTx }, timestamp: Date.now() })
    });
  } catch(e){}
  appendLog('Simulated payment accepted: ' + JSON.stringify(fakeTx));
  return { success: true, buyer: fakeBuyer, tx: fakeTx };
}

/* ================ Click owned tile opens link ================ */
document.addEventListener('click', (e) => {
  if (panelEl.contains(e.target)) return;
  const rect = document.getElementById('portraitCanvas').getBoundingClientRect();
  if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) return;
  const tile = gridInstance._screenToTile(e.clientX, e.clientY);
  if (!tile) return;
  const meta = gridInstance.getTileMeta(tile.x, tile.y);
  if (meta && meta.link) {
    window.open(meta.link, '_blank');
  }
});

/* ================ Debug helpers ================ */
function appendLog(msg) {
  const el = document.getElementById('tc-log');
  const line = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  const p = document.createElement('div');
  p.textContent = line;
  el.prepend(p);
  console.log(line);
}

async function runDebugCheck() {
  appendLog('Running debug check...');
  appendLog('window.TonConnect: ' + (!!window.TonConnect));
  appendLog('window.TonConnectUI: ' + (!!window.TonConnectUI));
  appendLog('window.tonConnectUI: ' + (!!window.tonConnectUI));
  const candidates = [
    window.location.origin + '/tonconnect-manifest.json',
    window.location.origin + '/public/tonconnect-manifest.json'
  ];
  for (const url of candidates) {
    try {
      const r = await fetch(url, { method: 'GET', cache: 'no-store' });
      appendLog(url + ' -> ' + r.status + ' content-type:' + (r.headers.get('content-type')||''));
    } catch (e) {
      appendLog(url + ' -> fetch error: ' + e.message);
    }
  }
}

async function forceLoadScripts() {
  appendLog('Forcing load of TonConnect scripts...');
  const urls = [
    'https://unpkg.com/@tonconnect/sdk/dist/tonconnect.umd.js',
    'https://unpkg.com/@tonconnect/ui/dist/tonconnect-ui.min.js'
  ];
  for (const u of urls) {
    if (!document.querySelector(`script[src="${u}"]`)) {
      const s = document.createElement('script');
      s.src = u;
      s.onload = () => appendLog('loaded ' + u);
      s.onerror = (e) => appendLog('load error ' + u);
      document.head.appendChild(s);
      await new Promise(r => setTimeout(r, 600));
    } else appendLog('already present ' + u);
  }
  appendLog('Force load complete.');
}

/* ================ helper ================ */
function _updatePosLabel(tile){
  const el = document.getElementById('posLabel');
  if (!el) return;
  if (!tile) el.textContent = 'Pos: —';
  else el.textContent = `Pos: (${tile.x},${tile.y})`;
}
