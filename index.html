<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TonCanvas | Web3 Ad Space</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #0088cc;
            --accent: #22c55e;
            --text: #f8fafc;
            --border: #334155;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; display: flex; flex-direction: column; height: 100vh;
        }

        header {
            padding: 12px 20px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); z-index: 100;
        }

        .logo { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.5px; }
        .logo span { color: var(--primary); }

        main {
            flex: 1; overflow: auto; display: flex; justify-content: center;
            align-items: flex-start; padding: 20px;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .canvas-wrapper {
            position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background: var(--card); border-radius: 8px; overflow: hidden;
        }

        canvas { cursor: crosshair; display: block; }

        /* Panel UI */
        .action-panel {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: var(--card);
            border: 1px solid var(--border); border-radius: 20px; padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); z-index: 1000;
            display: none; /* Muncul saat tile dipilih */
        }

        .input-group { margin: 15px 0; }
        label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 5px; font-weight: bold; }
        input {
            width: 100%; background: #0f172a; border: 1px solid var(--border);
            color: white; padding: 10px; border-radius: 8px; box-sizing: border-box;
        }

        .mint-btn {
            width: 100%; padding: 14px; background: var(--accent);
            color: white; border: none; border-radius: 12px;
            font-weight: 700; cursor: pointer; transition: 0.2s;
        }

        .mint-btn:active { transform: scale(0.98); }

        #ton-connect-btn { height: 40px; }
    </style>
</head>
<body>

<header>
    <div class="logo">TON<span>CANVAS</span></div>
    <div id="ton-connect-btn"></div>
</header>

<main>
    <div class="canvas-wrapper">
        <canvas id="mainCanvas" width="1000" height="1000"></canvas>
    </div>
</main>

<div class="action-panel" id="actionPanel">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <strong id="tileCoords">Tile: 0, 0</strong>
        <button onclick="closePanel()" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
    </div>

    <div class="input-group">
        <label>AD IMAGE URL (1:1 Ratio)</label>
        <input type="text" id="imgInput" placeholder="https://imgur.com/your-image.png">
    </div>
    <div class="input-group">
        <label>REDIRECT LINK</label>
        <input type="text" id="linkInput" placeholder="https://t.me/yourchannel">
    </div>

    <button class="mint-btn" id="buyButton" onclick="handleMint()">MINT TILE (0.1 TON)</button>
</div>

<script>
    // --- 1. INITIALIZATION ---
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Inisialisasi TON Connect
    const tonConnectUI = new TONConnectUI.TonConnectUI({
        manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp/main/public/tonconnect-manifest.json', // Ganti dengan manifest Anda nanti
        buttonRootId: 'ton-connect-btn'
    });

    const canvas = document.getElementById("mainCanvas");
    const ctx = canvas.getContext("2d");
    const panel = document.getElementById("actionPanel");
    
    const gridSize = 50; // 50x50 tiles
    const tileSize = canvas.width / gridSize;
    let selectedTile = null;
    let database = {}; // Simulasi penyimpanan sementara

    // --- 2. CANVAS LOGIC ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (let x = 0; x < gridSize; x++) {
            for (let y = 0; y < gridSize; y++) {
                const key = `${x}_${y}`;
                
                // Jika sudah dimiliki
                if (database[key]) {
                    ctx.fillStyle = database[key].color;
                    ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
                }

                ctx.strokeStyle = "rgba(51, 65, 85, 0.2)";
                ctx.strokeRect(x * tileSize, y * tileSize, tileSize, tileSize);
            }
        }

        // Highlight pilihan
        if (selectedTile) {
            ctx.fillStyle = "rgba(34, 197, 94, 0.4)";
            ctx.fillRect(selectedTile.x * tileSize, selectedTile.y * tileSize, tileSize, tileSize);
            ctx.strokeStyle = "#22c55e";
            ctx.lineWidth = 2;
            ctx.strokeRect(selectedTile.x * tileSize, selectedTile.y * tileSize, tileSize, tileSize);
        }
    }

    canvas.addEventListener("click", (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        const x = Math.floor(((e.clientX - rect.left) * scaleX) / tileSize);
        const y = Math.floor(((e.clientY - rect.top) * scaleY) / tileSize);

        selectedTile = { x, y };
        document.getElementById("tileCoords").innerText = `Tile: ${x}, ${y}`;
        panel.style.display = "block";
        
        draw();
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    });

    function closePanel() {
        panel.style.display = "none";
        selectedTile = null;
        draw();
    }

    // --- 3. TON TRANSACTION LOGIC ---
    async function handleMint() {
        // Cek koneksi wallet
        if (!tonConnectUI.connected) {
            tg.showAlert("Please connect your TON wallet first!");
            tonConnectUI.openModal();
            return;
        }

        const img = document.getElementById("imgInput").value;
        const link = document.getElementById("linkInput").value;

        if (!img || !link) {
            tg.showAlert("Fill in the Image URL and Link!");
            return;
        }

        // Struktur Transaksi
        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 360, // 6 menit
            messages: [
                {
                    address: "UQDZDbDI-vjbkEpviXoWXuAc3dTHG-MiYC8gi5tYnHxXMLDd", // GANTI DENGAN ALAMAT WALLET ANDA
                    amount: "500000000", // 0.5 TON (1 TON = 1,000,000,000 nanotons)
                }
            ]
        };

        try {
            tg.MainButton.show();
            tg.MainButton.setText("WAITING FOR CONFIRMATION...");
            tg.MainButton.disable();

            const result = await tonConnectUI.sendTransaction(transaction);
            
            // Jika sukses (Simulasi)
            const key = `${selectedTile.x}_${selectedTile.y}`;
            database[key] = {
                color: `hsl(${Math.random() * 360}, 70%, 60%)`,
                img: img,
                link: link
            };

            tg.showAlert("Transaction Successful! Your tile is being minted.");
            closePanel();
            draw();

        } catch (e) {
            console.error(e);
            tg.showAlert("Transaction cancelled or failed.");
        } finally {
            tg.MainButton.hide();
        }
    }

    draw();
</script>

</body>
</html>
