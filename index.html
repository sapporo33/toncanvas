<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Miniapp TON</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="profile">
        <img id="avatar" src="https://via.placeholder.com/48" alt="avatar">
        <div class="meta">
          <div class="small">Welcome back</div>
          <div id="username" class="name">User</div>
        </div>
      </div>
      <div>🔔</div>
    </header>

    <section class="balance-card">
      <div class="left">
        <h2>Total Balance</h2>
        <div id="balance" class="amount">0.00 TON</div>
      </div>
      <div class="actions">
        <button class="small-btn" type="button" onclick="showPage('withdraw')">Withdraw</button>
      </div>
    </section>

    <div class="section-title">
      <h3>Pending Tasks</h3>
      <div class="muted">Complete to earn</div>
    </div>

    <div class="tasks">
      <!-- Telegram task uses tgBtn id for compatibility -->
      <article class="card">
        <div class="task-left">
          <div class="icon">📩</div>
          <div class="task-meta">
            <div class="title">Ton Turbo Official</div>
            <div class="desc">Telegram Channel +0.25 TON</div>
          </div>
        </div>
        <button id="tgBtn" class="btn" type="button"
          data-start-text="Start" data-claim-text="Claim" data-done-text="Done"
          onclick="startTask('https://t.me/TonTurboOfficial', 0.25)">
          Start
        </button>
      </article>

      <article class="card">
        <div class="task-left">
          <div class="icon">🐦</div>
          <div class="task-meta">
            <div class="title">Ton Turbo Official</div>
            <div class="desc">Twitter Follow +0.25 TON</div>
          </div>
        </div>
        <button id="btn-twitter" class="btn" type="button"
          data-start-text="Start" data-claim-text="Claim" data-done-text="Done"
          onclick="startTask('twitter_follow','https://x.com/tonturboxyz',0.25)">
          Start
        </button>
      </article>

      <article class="card">
        <div class="task-left">
          <div class="icon">👥</div>
          <div class="task-meta">
            <div class="title">Invite Friend</div>
            <div class="desc">+0.10 TON</div>
          </div>
        </div>
        <button id="btn-invite" class="btn" type="button"
          data-start-text="Start" data-done-text="Done"
          onclick="startTask('invite','',0.1)">
          Start
        </button>
      </article>
    </div>

    <div id="withdraw" class="page">
      <h2>Withdraw</h2>
      <div class="input-row">
        <input id="wd" type="number" placeholder="Jumlah">
        <button class="btn" type="button" onclick="withdraw()">Withdraw</button>
      </div>
    </div>
  </div>

  <nav class="nav">
    <button type="button" onclick="showPage('home')">Home</button>
    <button type="button" onclick="showPage('task')">Task</button>
    <button type="button" onclick="showPage('leaderboard')">Rank</button>
    <button type="button" onclick="showPage('referral')">Ref</button>
    <button type="button" onclick="showPage('withdraw')">WD</button>
  </nav>

  <script src="app.js"></script>
  <script src="ui-sync.js"></script>
</body>
</html>
