<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TonCanvas | Web3 Ad Space</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #0088cc;
            --accent: #22c55e; --text: #f8fafc; --border: #334155;
        }
        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header {
            padding: 10px 15px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border);
            background: #1e293b; z-index: 100; min-height: 60px;
        }
        #ton-connect-btn { min-width: 150px; display: flex; justify-content: flex-end; }
        main { flex: 1; overflow: auto; display: flex; justify-content: center; padding: 20px; background: #0b1120; }
        .canvas-container { border: 2px solid var(--primary); background: #1e293b; position: relative; }
        canvas { display: block; touch-action: none; cursor: crosshair; max-width: 100%; }
        .panel {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 380px; background: var(--card);
            border: 1px solid var(--primary); border-radius: 16px; padding: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5); z-index: 1000; display: none;
        }
        input {
            width: 100%; background: #0f172a; border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px;
        }
        .btn-mint {
            width: 100%; padding: 14px; background: var(--accent);
            color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight:800; font-size:1.2rem;">TON<span style="color:var(--primary)">CANVAS</span></div>
    <div id="ton-connect-btn"></div>
</header>

<main>
    <div class="canvas-container">
        <canvas id="appCanvas" width="800" height="800"></canvas>
    </div>
</main>

<div class="panel" id="uiPanel">
    <div style="display:flex; justify-content: space-between; margin-bottom: 15px;">
        <span id="coordLabel" style="font-weight:800; color:var(--accent);">(0,0)</span>
        <button onclick="hidePanel()" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
    </div>
    <input type="text" id="imgUrl" placeholder="Image URL (PNG/JPG)">
    <input type="text" id="targetLink" placeholder="Redirect Link (https://...)">
    <button class="btn-mint" id="mintBtn" onclick="processPayment()">MINT TILE (0.5 TON)</button>
</div>

<script>
    let tonConnectUI;
    const canvas = document.getElementById('appCanvas');
    const ctx = canvas.getContext('2d');
    const panel = document.getElementById('uiPanel');
    const gridSize = 40;
    const tileSize = canvas.width / gridSize;
    let selected = null;
    let tilesData = {};

    async function initApp() {
        // Inisialisasi TON Connect sesuai dokumentasi
        try {
            tonConnectUI = new TONConnectUI.TonConnectUI({
                manifestUrl: 'https://toncanvas.vercel.app/tonconnect-manifest.json',
                buttonRootId: 'ton-connect-btn'
            });
            console.log("TON Connect UI Ready");
        } catch (e) {
            console.error("Initialization failed", e);
        }

        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
        draw();
    }

    function draw() {
        ctx.fillStyle = "#1e293b";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let x = 0; x < gridSize; x++) {
            for (let y = 0; y < gridSize; y++) {
                ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
                ctx.strokeRect(x * tileSize, y * tileSize, tileSize, tileSize);
            }
        }
        if (selected) {
            ctx.fillStyle = "rgba(34, 197, 94, 0.4)";
            ctx.fillRect(selected.x * tileSize, selected.y * tileSize, tileSize, tileSize);
        }
    }

    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor(((e.clientX - rect.left) * (canvas.width / rect.width)) / tileSize);
        const y = Math.floor(((e.clientY - rect.top) * (canvas.height / rect.height)) / tileSize);
        selected = { x, y };
        document.getElementById('coordLabel').innerText = `TILE: ${x}, ${y}`;
        panel.style.display = 'block';
        draw();
    });

    function hidePanel() { panel.style.display = 'none'; selected = null; draw(); }

    async function processPayment() {
        if (!tonConnectUI.connected) {
            return tonConnectUI.openModal();
        }
        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 360,
            messages: [{
                address: "UQDZDbDI-vjbkEpviXoWXuAc3dTHG-MiYC8gi5tYnHxXMLDd",
                amount: "500000000"
            }]
        };
        try {
            await tonConnectUI.sendTransaction(transaction);
            alert("Success!");
            hidePanel();
        } catch (e) { alert("Failed"); }
    }

    window.addEventListener('load', initApp);
</script>
</body>
</html>
