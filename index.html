<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Miniapp TON</title>
  <style>
    /* styling minimal agar tidak cuma teks polos */
    body { font-family: system-ui, Arial; padding: 20px; }
    .btn { padding: 8px 12px; margin: 6px 0; }
  </style>
</head>
<body>
  <header>
    <h1>Miniapp TON</h1>
    <div>
      <strong>Pengguna:</strong>
      <span id="username">-</span>
      <img id="avatar" src="" alt="" style="width:36px;height:36px;border-radius:50%;vertical-align:middle;margin-left:8px;display:none;">
    </div>
  </header>

  <main>
    <section>
      <div><strong>Saldo:</strong> <span id="balance">0.00 TON</span></div>
    </section>

    <section style="margin-top:12px;">
      <!-- Pastikan onclick memanggil startTask dan tombol bertipe button -->
      <button id="tgBtn" class="btn" type="button" onclick="startTask('https://t.me/your_channel', 0.25)">Start</button>
      <button class="btn" type="button" onclick="inviteTask()">Invite</button>
    </section>

    <section style="margin-top:12px;">
      <input id="wd" type="number" placeholder="Jumlah withdraw" />
      <button class="btn" type="button" onclick="withdraw()">Withdraw</button>
    </section>
  </main>

  <!-- Panggil file JS di sini, sebelum penutupan body -->
  <!-- Ganti "app.js" dengan nama file JS yang kamu deploy -->
  <script src="/app.js"></script>
</body>
</html>
