<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TonCanvas | Web3 Ad Space</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #0088cc; /* TON Blue */
            --accent: #22c55e;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            background: var(---bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; }
        .logo span { color: var(--primary); }

        #wallet-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }

        /* Main Canvas Area */
        main {
            flex: 1;
            position: relative;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .canvas-container {
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-radius: 4px;
            background: var(--card-bg);
        }

        canvas { cursor: crosshair; display: block; border-radius: 4px; }

        /* Action Panel */
        .panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            z-index: 100;
            transition: all 0.3s ease;
        }

        .panel-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .coords { font-family: monospace; color: var(--accent); font-weight: bold; }

        .input-group { margin-bottom: 12px; text-align: left; }
        label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
        input {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            outline: none;
        }

        .buy-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .buy-btn:disabled { background: #475569; cursor: not-allowed; }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            header { padding: 12px; }
            .panel { bottom: 10px; width: 95%; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">TON<span>CANVAS</span></div>
    <button id="wallet-btn">Connect Wallet</button>
</header>

<main>
    <div class="canvas-container">
        <canvas id="canvas" width="800" height="800"></canvas>
    </div>
</main>

<div class="panel" id="actionPanel">
    <div class="panel-header">
        <span id="status">Select a tile to start</span>
        <span class="coords" id="coordsDisplay">X: -- Y: --</span>
    </div>

    <div id="editor" style="display: none;">
        <div class="input-group">
            <label>AD IMAGE URL</label>
            <input type="text" id="imgUrl" placeholder="https://image.link/logo.png">
        </div>
        <div class="input-group">
            <label>DESTINATION LINK</label>
            <input type="text" id="destLink" placeholder="https://t.me/your_channel">
        </div>
        <button class="buy-btn" onclick="confirmPurchase()">Mint Tile (0.1 TON)</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const coordsDisplay = document.getElementById("coordsDisplay");
    const editor = document.getElementById("editor");
    const status = document.getElementById("status");

    const gridSize = 40; // 40x40 tiles
    const tileSize = canvas.width / gridSize;
    
    let selectedTile = null;
    let ownedTiles = {}; // Simulation of blockchain data

    // Initialize Telegram Mini App
    const WebApp = window.Telegram.WebApp;
    WebApp.expand();
    WebApp.ready();

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (let x = 0; x < gridSize; x++) {
            for (let y = 0; y < gridSize; y++) {
                const key = `${x}_${y}`;
                
                if (ownedTiles[key]) {
                    ctx.fillStyle = ownedTiles[key].color;
                    ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
                }

                ctx.strokeStyle = "rgba(51, 65, 85, 0.3)";
                ctx.strokeRect(x * tileSize, y * tileSize, tileSize, tileSize);
            }
        }

        // Highlight selected
        if (selectedTile) {
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#22c55e";
            ctx.strokeRect(selectedTile.x * tileSize, selectedTile.y * tileSize, tileSize, tileSize);
            ctx.fillStyle = "rgba(34, 197, 94, 0.2)";
            ctx.fillRect(selectedTile.x * tileSize, selectedTile.y * tileSize, tileSize, tileSize);
        }
    }

    canvas.addEventListener("click", (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / (rect.width / gridSize));
        const y = Math.floor((e.clientY - rect.top) / (rect.height / gridSize));

        selectedTile = { x, y };
        coordsDisplay.innerText = `X: ${x} Y: ${y}`;
        status.innerText = "Tile Selected";
        editor.style.display = "block";
        
        draw();
        
        // Haptic feedback for Telegram
        if (WebApp.HapticFeedback) {
            WebApp.HapticFeedback.impactOccurred('light');
        }
    });

    function confirmPurchase() {
        const img = document.getElementById("imgUrl").value;
        const link = document.getElementById("destLink").value;
        
        if (!img || !link) {
            WebApp.showAlert("Please fill in both Image and Link fields!");
            return;
        }

        const key = `${selectedTile.x}_${selectedTile.y}`;
        
        // Simulation: Adding to "Owned" list
        ownedTiles[key] = {
            color: `hsl(${Math.random() * 360}, 70%, 50%)`, // Random vibrant color
            img: img,
            link: link
        };

        WebApp.showConfirm(`Confirm purchase for ${selectedTile.x}, ${selectedTile.y}?`, (confirmed) => {
            if (confirmed) {
                draw();
                status.innerText = "Purchase Successful!";
                editor.style.display = "none";
                selectedTile = null;
                WebApp.showAlert("Tile minted on TON successfully!");
            }
        });
    }

    draw();
</script>

</body>
</html>
