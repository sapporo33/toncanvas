<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TON Connect Test</title>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<style>
    body { background:#0f172a; color:white; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; }
    #ton-connect-btn { min-width:200px; margin-bottom:20px; }
    .btn { padding:12px 20px; background:#22c55e; border:none; color:white; font-weight:bold; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>

<div>
    <div id="ton-connect-btn"></div>
    <button class="btn" id="sendTxBtn">Kirim 0.5 TON</button>
</div>

<script>
let tonConnectUI;
let userAddress = null;

function init() {
    tonConnectUI = new TonConnectUI.TonConnectUI({
        manifestUrl: 'https://toncanvas.vercel.app/tonconnect-manifest.json', // Pastikan manifest ini benar
        buttonRootId: 'ton-connect-btn'
    });

    // Event connect
    tonConnectUI.on('connect', (wallet) => {
        userAddress = wallet.account.address;
        alert("Wallet connected: " + userAddress);
        console.log("Connected:", userAddress);
    });

    tonConnectUI.on('disconnect', () => {
        userAddress = null;
        alert("Wallet disconnected");
        console.log("Disconnected");
    });

    document.getElementById('sendTxBtn').addEventListener('click', async () => {
        if (!userAddress) {
            alert("Hubungkan wallet dulu!");
            tonConnectUI.openModal();
            return;
        }

        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 300,
            messages: [{
                address: "UQDZDbDI-vjbkEpviXoWXuAc3dTHG-MiYC8gi5tYnHxXMLDd",
                amount: "500000000" // 0.5 TON dalam nanotons
            }]
        };

        try {
            await tonConnectUI.sendTransaction(transaction);
            alert("Transaksi Berhasil!");
        } catch (err) {
            alert("Transaksi Dibatalkan");
            console.error(err);
        }
    });
}

window.onload = init;
</script>
</body>
</html>
