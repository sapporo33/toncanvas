<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>TonCanvas Portrait Fixed Grid</title>
<style>
  :root{
    --bg:#0b1220;
    --grid:#1e293b;
    --line:rgba(255,255,255,0.06);
    --hover:rgba(59,130,246,0.28);
    --select:rgba(34,197,94,0.45);
    --accent:#0ea5e9;
    --muted:#9ca3af;
  }
  html,body{height:100%;margin:0;background:var(--bg);color:#fff;font-family:Inter,system-ui,Roboto,Arial;}
  #app{display:flex;flex-direction:column;height:100vh;padding:12px;box-sizing:border-box;gap:10px;}
  header{display:flex;justify-content:space-between;align-items:center;}
  .title{font-weight:600;font-size:16px;}
  .sub{font-size:12px;color:var(--muted);}
  #canvasWrap{flex:1 1 auto;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:12px;padding:8px;background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);}
  canvas{background:var(--grid);border-radius:8px;touch-action:none;display:block;width:100%;height:100%;max-width:420px;max-height:calc(100vh - 140px);}
  footer{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .btn{background:var(--accent);color:#fff;border:none;padding:10px 12px;border-radius:10px;font-weight:600;cursor:pointer;}
  .ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted);}
  .info{font-size:12px;color:var(--muted);text-align:right;}
  /* small accessibility focus */
  button:focus{outline:2px solid rgba(14,165,233,0.6); outline-offset:2px;}
</style>
</head>
<body>
<div id="app" role="application" aria-label="TonCanvas portrait">
  <header>
    <div>
      <div class="title">TonCanvas</div>
      <div class="sub">Portrait grid • Tap untuk pilih • Drag untuk multi‑select • Pinch/scroll untuk zoom</div>
    </div>
    <div class="sub" id="posLabel">Pos: —</div>
  </header>

  <div id="canvasWrap">
    <canvas id="portraitCanvas" aria-label="Grid canvas"></canvas>
  </div>

  <footer>
    <div style="display:flex;gap:8px;">
      <button class="btn" id="clearBtn">Clear</button>
      <button class="btn ghost" id="selectAllBtn">Select All</button>
    </div>
    <div class="info">Grid fixed • Portrait • Multi‑select drag</div>
  </footer>
</div>

<script>
/* ====== Configuration ====== */
const GRID_SIZE = 40;      // tiles per side
const TILE_SIZE = 20;      // logical tile size (in logical pixels)
const MIN_SCALE = 0.6;
const MAX_SCALE = 3.0;
const INITIAL_SCALE = 1.0;

/* ====== PortraitGrid class (fixed grid, accurate mapping) ====== */
class PortraitGrid {
  constructor(canvas, opts = {}) {
    if (!canvas || !canvas.getContext) throw new Error('Canvas required');
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.dpr = Math.max(1, window.devicePixelRatio || 1);

    this.gridSize = opts.gridSize || GRID_SIZE;
    this.tileSize = opts.tileSize || TILE_SIZE;
    this.scale = opts.scale || INITIAL_SCALE;

    // grid is centered and fixed; no panning
    this.selected = new Set(); // keys "x,y"
    this.hover = null;

    // drag selection state
    this.isDragging = false;
    this.dragStart = null; // {x,y} logical tile or null
    this.dragEnd = null;

    this._needsRedraw = true;
    this._bindEvents();
    this._resize();
    window.addEventListener('resize', () => this._resize());
    this._loop();
  }

  /* Public API */
  clear() { this.selected.clear(); this._mark(); }
  selectAll() {
    this.selected.clear();
    for (let x = 0; x < this.gridSize; x++) {
      for (let y = 0; y < this.gridSize; y++) {
        this.selected.add(`${x},${y}`);
      }
    }
    this._mark();
  }

  /* Internal: event binding */
  _bindEvents() {
    // pointer events for tap and drag selection
    this.canvas.addEventListener('pointerdown', (e) => {
      this.canvas.setPointerCapture(e.pointerId);
      const tile = this._screenToTile(e.clientX, e.clientY);
      this.isDragging = true;
      // if pointerdown outside grid, start with invalid tile but allow dragging into grid
      this.dragStart = tile ? { x: tile.x, y: tile.y } : { x: -1, y: -1 };
      this.dragEnd = this.dragStart;
      this._mark();
    });

    this.canvas.addEventListener('pointermove', (e) => {
      if (this.isDragging) {
        const t = this._screenToTile(e.clientX, e.clientY);
        this.dragEnd = t ? { x: t.x, y: t.y } : { x: -1, y: -1 };
        this._mark();
      } else {
        const t = this._screenToTile(e.clientX, e.clientY);
        this.hover = t;
        this._updatePosLabel(t);
        this._mark();
      }
    });

    this.canvas.addEventListener('pointerup', (e) => {
      this.canvas.releasePointerCapture(e.pointerId);
      if (this.isDragging) {
        this.isDragging = false;
        this._applyDragSelection();
        this.dragStart = null;
        this.dragEnd = null;
        this._mark();
      }
    });

    // wheel zoom (desktop)
    this.canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = -e.deltaY * 0.0015;
      this._zoomAt(delta, e.clientX, e.clientY);
    }, { passive: false });

    // pinch zoom (touch)
    let pinchStart = null;
    this.canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) pinchStart = this._touchDistance(e.touches);
    }, { passive: true });

    this.canvas.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && pinchStart) {
        const d = this._touchDistance(e.touches);
        const delta = (d - pinchStart) * 0.002;
        const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        this._zoomAt(delta, cx, cy);
        pinchStart = d;
      }
    }, { passive: true });

    this.canvas.addEventListener('touchend', () => { pinchStart = null; }, { passive: true });
  }

  _touchDistance(touches) {
    const a = touches[0], b = touches[1];
    return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
  }

  /* Apply drag selection: add all tiles inside rectangle to selected set */
  _applyDragSelection() {
    if (!this.dragStart || !this.dragEnd) return;
    const s = this._clampTile(this.dragStart);
    const e = this._clampTile(this.dragEnd);
    if (!s || !e) return;
    const x1 = Math.min(s.x, e.x), y1 = Math.min(s.y, e.y);
    const x2 = Math.max(s.x, e.x), y2 = Math.max(s.y, e.y);
    for (let x = x1; x <= x2; x++) {
      for (let y = y1; y <= y2; y++) {
        this.selected.add(`${x},${y}`);
      }
    }
  }

  _clampTile(t) {
    if (!t) return null;
    const x = Math.floor(Number(t.x));
    const y = Math.floor(Number(t.y));
    if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
    if (x < 0 || y < 0 || x >= this.gridSize || y >= this.gridSize) return null;
    return { x, y };
  }

  /* ====== CRITICAL: accurate mapping from client coords -> tile ======
     Uses canvas.getBoundingClientRect() and canvas.width/backing store consistently.
     Grid is centered in backing pixels; same left/top used in _draw.
  */
  _screenToTile(clientX, clientY) {
    const rect = this.canvas.getBoundingClientRect();
    // client -> backing pixels
    const px = (clientX - rect.left) * (this.canvas.width / rect.width);
    const py = (clientY - rect.top) * (this.canvas.height / rect.height);

    // grid size in backing pixels
    const gridPixel = this.gridSize * this.tileSize * this.scale * this.dpr;

    // center of canvas in backing pixels
    const canvasCenterX = this.canvas.width / 2;
    const canvasCenterY = this.canvas.height / 2;

    // top-left of grid in backing pixels (same as used in _draw)
    const gridLeft = canvasCenterX - gridPixel / 2;
    const gridTop = canvasCenterY - gridPixel / 2;

    // local logical coordinates (in logical pixels)
    const localX = (px - gridLeft) / (this.scale * this.dpr);
    const localY = (py - gridTop) / (this.scale * this.dpr);

    const tx = Math.floor(localX / this.tileSize);
    const ty = Math.floor(localY / this.tileSize);

    if (tx < 0 || ty < 0 || tx >= this.gridSize || ty >= this.gridSize) return null;
    return { x: tx, y: ty };
  }

  /* Zoom around a point but keep grid visually centered (no panning) */
  _zoomAt(delta, clientX, clientY) {
    const old = this.scale;
    let next = Math.min(MAX_SCALE, Math.max(MIN_SCALE, this.scale + delta));
    if (next === old) return;
    // We only change scale; grid remains centered in canvas.
    this.scale = next;
    this._mark();
  }

  /* Resize: set CSS size and backing store consistently (square) */
  _resize() {
    const maxWidth = Math.min(window.innerWidth - 24, 420);
    const availableHeight = window.innerHeight - 140;
    // choose a square size that fits portrait and remains usable
    const final = Math.max(240, Math.min(maxWidth, Math.floor(Math.min(window.innerWidth - 24, availableHeight))));
    this.canvas.style.width = final + 'px';
    this.canvas.style.height = final + 'px';
    const backing = Math.round(final * this.dpr);
    this.canvas.width = backing;
    this.canvas.height = backing;
    this._mark();
  }

  _mark() { this._needsRedraw = true; }

  _loop() {
    requestAnimationFrame(() => this._loop());
    if (this._needsRedraw) {
      this._needsRedraw = false;
      this._draw();
    }
  }

  /* Draw: use same centered left/top as _screenToTile */
  _draw() {
    const ctx = this.ctx;
    const canvas = this.canvas;
    if (!ctx || !canvas) return;

    // reset and clear
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // compute centered grid origin in backing pixels
    const gridPixel = this.gridSize * this.tileSize * this.scale * this.dpr;
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const left = cx - gridPixel / 2;
    const top = cy - gridPixel / 2;

    // apply transform: scale in logical units, translate by left/top in backing pixels
    ctx.setTransform(this.scale * this.dpr, 0, 0, this.scale * this.dpr, left, top);

    // background (logical coords)
    ctx.fillStyle = '#1e293b';
    ctx.fillRect(0, 0, this.gridSize * this.tileSize, this.gridSize * this.tileSize);

    // grid lines (single path for performance)
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1 / (this.scale * this.dpr);
    for (let i = 0; i <= this.gridSize; i++) {
      const p = i * this.tileSize + 0.5;
      ctx.moveTo(p, 0);
      ctx.lineTo(p, this.gridSize * this.tileSize);
      ctx.moveTo(0, p);
      ctx.lineTo(this.gridSize * this.tileSize, p);
    }
    ctx.stroke();

    // selected tiles
    if (this.selected.size) {
      ctx.fillStyle = 'rgba(34,197,94,0.45)';
      for (const k of this.selected) {
        const [sx, sy] = k.split(',').map(Number);
        if (!Number.isFinite(sx) || !Number.isFinite(sy)) continue;
        ctx.fillRect(sx * this.tileSize, sy * this.tileSize, this.tileSize, this.tileSize);
      }
    }

    // hover tile
    if (this.hover) {
      const { x, y } = this.hover;
      if (Number.isInteger(x) && Number.isInteger(y)) {
        ctx.fillStyle = 'rgba(59,130,246,0.28)';
        ctx.fillRect(x * this.tileSize, y * this.tileSize, this.tileSize, this.tileSize);
      }
    }

    // drag selection box (draw in logical coords)
    if (this.isDragging && this.dragStart && this.dragEnd) {
      const s = this.dragStart || { x: -1, y: -1 };
      const e = this.dragEnd || { x: -1, y: -1 };
      // clamp for drawing
      const sx = Math.max(0, Math.min(this.gridSize - 1, s.x));
      const sy = Math.max(0, Math.min(this.gridSize - 1, s.y));
      const ex = Math.max(0, Math.min(this.gridSize - 1, e.x));
      const ey = Math.max(0, Math.min(this.gridSize - 1, e.y));
      const x1 = Math.min(sx, ex), y1 = Math.min(sy, ey);
      const x2 = Math.max(sx, ex), y2 = Math.max(sy, ey);
      ctx.fillStyle = 'rgba(59,130,246,0.18)';
      ctx.fillRect(x1 * this.tileSize, y1 * this.tileSize, (x2 - x1 + 1) * this.tileSize, (y2 - y1 + 1) * this.tileSize);
      ctx.strokeStyle = 'rgba(59,130,246,0.6)';
      ctx.lineWidth = 1 / (this.scale * this.dpr);
      ctx.strokeRect(x1 * this.tileSize + 0.5, y1 * this.tileSize + 0.5, (x2 - x1 + 1) * this.tileSize - 1, (y2 - y1 + 1) * this.tileSize - 1);
    }
  }
}

/* ====== Initialize ====== */
document.addEventListener('DOMContentLoaded', () => {
  const canvas = document.getElementById('portraitCanvas');
  const grid = new PortraitGrid(canvas, { gridSize: 40, tileSize: 20, scale: 1 });

  // UI hooks
  document.getElementById('clearBtn').addEventListener('click', () => grid.clear());
  document.getElementById('selectAllBtn').addEventListener('click', () => grid.selectAll());

  // expose for debugging and integration
  window.__TonCanvasPortrait = grid;
});

/* ====== helper to update pos label ====== */
function _updatePosLabel(tile) {
  const el = document.getElementById('posLabel');
  if (!el) return;
  if (!tile) el.textContent = 'Pos: —';
  else el.textContent = `Pos: (${tile.x},${tile.y})`;
}
</script>
</body>
</html>
